<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><title>Components · Charts</title>
<link rel="stylesheet" href="../foundations/colors_and_type.css"/>
<link rel="stylesheet" href="../foundations/components.css"/>
<style>body{padding:20px;}
.grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
.label{font-size:11px;color:var(--ff-fg-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:6px;}
.card{padding:14px;border:1px solid var(--ff-border);border-radius:10px;background:var(--ff-card);}
</style>
</head><body>
<div class="grid">
  <div class="card">
    <div class="label">Spend over time</div>
    <svg viewBox="0 0 420 200" width="100%" height="180" class="ff-chart" preserveAspectRatio="none">
      <g class="grid">
        <line x1="32" x2="420" y1="20" y2="20"/><line x1="32" x2="420" y1="60" y2="60"/><line x1="32" x2="420" y1="100" y2="100"/><line x1="32" x2="420" y1="140" y2="140"/><line x1="32" x2="420" y1="180" y2="180"/>
      </g>
      <path d="M 40,140 L 80,128 L 120,148 L 160,108 L 200,84 L 240,92 L 280,64 L 320,40 L 360,52 L 400,28" stroke="var(--ff-chart-1)" fill="none" stroke-width="2"/>
      <path d="M 40,140 L 80,128 L 120,148 L 160,108 L 200,84 L 240,92 L 280,64 L 320,40 L 360,52 L 400,28 L 400,180 L 40,180 Z" fill="var(--ff-chart-1)" opacity="0.10"/>
    </svg>
  </div>
  <div class="card">
    <div class="label">By category</div>
    <svg viewBox="0 0 200 180" width="100%" height="180">
      <g transform="translate(100,90)">
        <circle r="62" fill="none" stroke="var(--ff-chart-1)" stroke-width="22" stroke-dasharray="120 390" transform="rotate(-90)"/>
        <circle r="62" fill="none" stroke="var(--ff-chart-2)" stroke-width="22" stroke-dasharray="92 390" stroke-dashoffset="-120" transform="rotate(-90)"/>
        <circle r="62" fill="none" stroke="var(--ff-chart-3)" stroke-width="22" stroke-dasharray="48 390" stroke-dashoffset="-212" transform="rotate(-90)"/>
        <circle r="62" fill="none" stroke="var(--ff-chart-4)" stroke-width="22" stroke-dasharray="34 390" stroke-dashoffset="-260" transform="rotate(-90)"/>
        <circle r="62" fill="none" stroke="var(--ff-chart-5)" stroke-width="22" stroke-dasharray="24 390" stroke-dashoffset="-294" transform="rotate(-90)"/>
        <circle r="62" fill="none" stroke="var(--ff-chart-6)" stroke-width="22" stroke-dasharray="72 390" stroke-dashoffset="-318" transform="rotate(-90)"/>
      </g>
    </svg>
  </div>
</div>
<div style="margin-top:10px;font-size:11px;color:var(--ff-fg-muted);">Line · area · bar · donut · sparkline · KPI · 6-color categorical palette</div>
</body></html>
