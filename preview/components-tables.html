<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><title>Components · Tables</title>
<link rel="stylesheet" href="../foundations/colors_and_type.css"/>
<link rel="stylesheet" href="../foundations/components.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<style>body{padding:24px;}</style>
</head><body>
<div class="ff-card" style="overflow:hidden;">
  <table class="ff-table">
    <thead><tr><th>ID</th><th>Merchant</th><th>Owner</th><th class="ff-num">Amount</th><th>Status</th></tr></thead>
    <tbody>
      <tr><td style="font-family:var(--ff-font-mono);font-size:12px;color:var(--ff-fg-muted);">EXP-2841</td><td>United Airlines</td><td>Luna Park</td><td class="ff-num">$842.50</td><td><span class="ff-badge ff-badge--pending ff-badge--no-dot"><i class="ph ph-clock" style="font-size:12px;"></i> Pending</span></td></tr>
      <tr><td style="font-family:var(--ff-font-mono);font-size:12px;color:var(--ff-fg-muted);">EXP-2840</td><td>Figma</td><td>Mira Solberg</td><td class="ff-num">$180.00</td><td><span class="ff-badge ff-badge--approved ff-badge--no-dot"><i class="ph ph-check-circle" style="font-size:12px;"></i> Approved</span></td></tr>
      <tr><td style="font-family:var(--ff-font-mono);font-size:12px;color:var(--ff-fg-muted);">EXP-2839</td><td>Marriott Austin</td><td>Luna Park</td><td class="ff-num">$1,240.00</td><td><span class="ff-badge ff-badge--flagged ff-badge--no-dot"><i class="ph ph-warning" style="font-size:12px;"></i> Flagged</span></td></tr>
      <tr><td style="font-family:var(--ff-font-mono);font-size:12px;color:var(--ff-fg-muted);">EXP-2832</td><td>Eventbrite</td><td>Iris Chen</td><td class="ff-num">$640.00</td><td><span class="ff-badge ff-badge--rejected ff-badge--no-dot"><i class="ph ph-x-circle" style="font-size:12px;"></i> Rejected</span></td></tr>
    </tbody>
  </table>
</div>
<div style="font-size:11px;color:var(--ff-fg-muted);margin-top:10px;">Tabular figures right-aligned · sticky headers · hover row highlight</div>
</body></html>
