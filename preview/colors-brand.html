<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><title>Colors · Plum brand scale</title>
<link rel="stylesheet" href="../foundations/colors_and_type.css"/>
<link rel="stylesheet" href="../foundations/components.css"/>
<style>
  body{padding:20px;}
  .swatch{aspect-ratio:1.4;border-radius:8px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;font-size:10px;font-family:var(--ff-font-mono);}
  .swatch--light{color:#FBF5E8;}
  .swatch--dark{color:var(--ff-ink-950);}
  .row{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
  h3{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ff-fg-muted);font-weight:500;}
</style>
</head><body>
<h3>Plum — brand</h3>
<div class="row">
  <div class="swatch swatch--dark" style="background:var(--ff-plum-50);"><span>50</span><span></span></div>
  <div class="swatch swatch--dark" style="background:var(--ff-plum-100);"><span>100</span><span></span></div>
  <div class="swatch swatch--dark" style="background:var(--ff-plum-200);"><span>200</span><span></span></div>
  <div class="swatch swatch--dark" style="background:var(--ff-plum-300);"><span>300</span><span></span></div>
  <div class="swatch swatch--light" style="background:var(--ff-plum-400);"><span>400</span><span></span></div>
  <div class="swatch swatch--light" style="background:var(--ff-plum-500);"><span>500</span><span></span></div>
  <div class="swatch swatch--light" style="background:var(--ff-plum-600);"><span>600</span><span></span></div>
  <div class="swatch swatch--light" style="background:var(--ff-plum-700);"><span>700★</span><span>primary</span></div>
  <div class="swatch swatch--light" style="background:var(--ff-plum-800);"><span>800</span><span></span></div>
  <div class="swatch swatch--light" style="background:var(--ff-plum-900);"><span>900</span><span></span></div>
</div>
<h3 style="margin-top:14px;">Citron — accent</h3>
<div class="row" style="grid-template-columns:repeat(4,1fr);">
  <div class="swatch swatch--dark" style="background:var(--ff-citron-100);"><span>100</span><span></span></div>
  <div class="swatch swatch--dark" style="background:var(--ff-citron-300);"><span>300</span><span></span></div>
  <div class="swatch swatch--dark" style="background:var(--ff-citron-500);"><span>500★</span><span>accent</span></div>
  <div class="swatch swatch--light" style="background:var(--ff-citron-700);"><span>700</span><span></span></div>
</div>
<div style="font-size:11px;color:var(--ff-fg-muted);margin-top:14px;line-height:1.5;">
  Plum 700 is the brand primary. Citron 500 is reserved for emphasis & quick-actions — used sparingly.
</div>
</body></html>
