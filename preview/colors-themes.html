<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><title>Colors · Themes</title>
<link rel="stylesheet" href="../foundations/colors_and_type.css"/>
<link rel="stylesheet" href="../foundations/components.css"/>
<style>body{padding:0;margin:0;}
.pane{padding:20px;height:100%;display:flex;flex-direction:column;gap:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;}
.tile{padding:10px 12px;border-radius:8px;border:1px solid var(--ff-border);background:var(--ff-card);display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.tile span:last-child{font-family:var(--ff-font-mono);color:var(--ff-fg-muted);font-size:11px;}
.label{font-size:11px;color:var(--ff-fg-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;}
</style>
</head><body>
<div class="grid" style="height:380px;">
  <div class="pane" data-theme="light" style="background:var(--ff-bg);color:var(--ff-fg);">
    <div class="label">Light theme</div>
    <div class="tile"><span>Background</span><span>--ff-bg</span></div>
    <div class="tile"><span>Surface</span><span>--ff-card</span></div>
    <div class="tile"><span>Foreground</span><span>--ff-fg</span></div>
    <div class="tile"><span>Muted</span><span>--ff-fg-muted</span></div>
    <div class="tile"><span>Border</span><span>--ff-border</span></div>
    <div class="tile" style="background:var(--ff-primary);color:var(--ff-primary-fg);"><span>Primary</span><span style="color:inherit;opacity:0.7;">--ff-primary</span></div>
  </div>
  <div class="pane" data-theme="dark" style="background:var(--ff-bg);color:var(--ff-fg);">
    <div class="label">Dark theme</div>
    <div class="tile"><span>Background</span><span>--ff-bg</span></div>
    <div class="tile"><span>Surface</span><span>--ff-card</span></div>
    <div class="tile"><span>Foreground</span><span>--ff-fg</span></div>
    <div class="tile"><span>Muted</span><span>--ff-fg-muted</span></div>
    <div class="tile"><span>Border</span><span>--ff-border</span></div>
    <div class="tile" style="background:var(--ff-primary);color:var(--ff-primary-fg);"><span>Primary</span><span style="color:inherit;opacity:0.7;">--ff-primary</span></div>
  </div>
</div>
</body></html>
