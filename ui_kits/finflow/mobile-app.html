<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FinFlow — Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0c0e10"/>
  <meta name="robots" content="noindex"/>
  <link rel="stylesheet" href="../../foundations/colors_and_type.css"/>
  <link rel="stylesheet" href="../../foundations/components.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&display=swap"/>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"/>
  <style>
    html, body, #root { height: 100%; min-height: 100%; }
    html { background: #0c0e10; }
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js?v=2"></script>
  <script type="text/babel" src="../../brand/BrandMark.jsx?v=2"></script>
  <script type="text/babel" src="layout.jsx?v=2"></script>
  <script type="text/babel" src="screens/mobile.jsx?v=2"></script>

  <script type="text/babel">
    /* Real tap-through app shell for the 8 mobile screens, rendered full-bleed —
       this is what actually loads when a recruiter opens FinFlow on a real phone.
       The desktop gallery (index.html's MobileShelf) reuses the exact same
       components at a shrunk-down decorative scale; this is the genuine article. */
    const SCREENS = {
      signin:   (nav) => <MobileSignIn onNav={nav} fullbleed/>,
      home:     (nav) => <MobileHome onNav={nav} fullbleed/>,
      snap:     (nav) => <MobileSnapReceipt onNav={nav} fullbleed/>,
      new:      (nav) => <MobileNewExpense onNav={nav} fullbleed/>,
      success:  (nav) => <MobileSubmitSuccess onNav={nav} fullbleed/>,
      timeline: (nav, id) => <MobileStatusTimeline onNav={nav} fullbleed expenseId={id}/>,
      expenses: (nav) => <MobileExpenses onNav={nav} fullbleed/>,
      cards:    (nav) => <MobileCards onNav={nav} fullbleed/>
    };

    const App = () => {
      const [screen, setScreen] = React.useState('signin');
      const [expenseId, setExpenseId] = React.useState('EXP-2841');

      const nav = (next, payload) => {
        if (next === 'timeline' && payload) setExpenseId(payload);
        setScreen(next);
        window.scrollTo(0, 0);
      };

      return SCREENS[screen](nav, expenseId);
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
